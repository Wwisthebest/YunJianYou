server:
  port: 8086
spring:
  #允许Bean或依赖循环引用
  main:
    allow-circular-references: true
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/travel?serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    type: com.alibaba.druid.pool.DruidDataSource

    # 数据源其它配置
    initialSize: 5 #初始化连接数量
    minIdle: 5     #最小连接数
    maxActive: 1000  #最大连接数 2023/3/20修改最大连接数为1000
    maxWait: 60000 #获取连接最大等待时间
    #间隔多久进行一次检测 单位是毫秒
    timeBetweenEvictionRunsMillis: 60000
    #一个连接在池中最小生存的时间
    minEvictableIdleTimeMillis: 300000
    validationQuery: SELECT 1 FROM DUAL
    testWhileIdle: true
    testOnBorrow: false
    testOnReturn: false
    #是否缓存preparedStatement即PSCache 官网建议mysql下关闭，个人建议如果想用sql防火墙建议开启
    poolPreparedStatements: true
    # 配置监控统计拦截的filters，去掉后监控界面sql无法统计，'wall'用于防火墙
    filters: stat,wall
    maxPoolPreparedStatementPerConnectionSize: 20
    useGlobalDataSourceStat: true
    connectionProperties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=500

  #关闭Thymekeaf的缓存
  thymeleaf:
    cache: false #不要缓存
  mvc:
    format:
      date: yyyy-MM-dd
  servlet:
    multipart:
      max-file-size: 10MB  #单个文件大小
      max-request-size: 10MB  #设置总上传的数据大小





