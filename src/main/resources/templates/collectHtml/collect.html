<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <meta content="" name="description">
    <meta content="Mark Otto, Jacob Thornton, and Bootstrap contributors" name="author">
    <meta content="Hugo 0.88.1" name="generator">
    <title>收藏列表</title>

    <!--导入layui-->
    <link href="../../static/layui/css/layui.css" rel="stylesheet" th:href="@{/layui/css/layui.css}"/>
    <!-- Bootstrap CSS-->
    <link href="../../static/css/bootstrap.min.css" rel="stylesheet" th:href="@{/css/bootstrap.min.css}"/>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../../static/css/ticket.css" th:href="@{/css/ticket.css}"/>
    <link rel="stylesheet" type="text/css" href="../../static/css/animate.min.css" th:href="@{/css/animate.min.css}"/>
    <!-- Custom Fonts -->
    <link href="../../static/font-awesome/css/font-awesome.min.css" rel="stylesheet" type="text/css" th:href="@{/font-awesome/css/font-awesome.min.css}"/>
    <style>
        .page-item {
            margin: 0 5px;
        }

        .page-link {
            border: 1px solid blue;
            padding: 5px 10px;
            border-radius: 5px;
        }
        .table {
            table-layout: fixed;
        }

        th, td {
            text-align: center;
        }
    </style>

</head>
<body>

<!--导航栏-->
<nav id="menu" class="navbar navbar-default navbar-fixed-top navbar-transparent">
    <div class="container">
        <div class="collapse navbar-collapse" id="bs-example-navbar-collapse-1">
            <img src="../static/images/logo.png" th:src="@{/images/logo.png}" style="width: 190px; height:50px;float: left;" >
            <ul class="nav navbar-nav navbar-right">
                <!--TODO 导航栏功能跳转按钮，后期添加-->
                <li><a th:href="@{/index}"><i class="layui-icon layui-icon-home" style="font-size: 18px" ></i> 首页</a></li>
                <li><a th:if="${session.user!=null}" th:text="'欢迎你：'+${session.user.uName}">
                    <i class="layui-icon layui-icon-user" style="font-size: 18px" ></i>
                </a><a th:if="${session.user==null}" href="/login"><i class="layui-icon layui-icon-user" style="font-size: 18px" ></i> 登录 | 注册</a></li>
                <li><a th:if="${session.user!=null}" href="/logout">退出</a></li>
            </ul>
        </div>
    </div>
</nav>

<!--头部-->
<header class="text-center" name="home">
    <div class="intro-text"></div>

</header>
<!--内容-->
<div class="index-page" id="page-content">
    <section class="box-content box-style text-center" id="">
        <div class="container">
            <div class="row heading wow fadeInDown">
                <div class="col-lg-12">
                    <h2>我的 <strong>收藏</strong></h2>
                    <br><br>
                    <div class="clearfix"></div>
                </div>
            </div>

            <table class="table table-striped table-sm">
                <thead>
                <tr>
                    <th scope="col">景点名称</th>
                    <th scope="col">景点地址</th>
                    <th scope="col">单价</th>
                    <th scope="col">操作</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="collect:${collect}">
                    <td th:text="${collect.ssName}">1,001</td>
                    <td th:text="${collect.ssAddress}"></td>
                    <td th:text="${collect.ssPrice}">text</td>
                    <td style="display: flex; align-items: center; justify-content: center;" >
                        <a class="layui-btn layui-btn-danger layui-btn-sm"
                           th:href="@{/collect/delCollect/}+${collect.fId}">取消收藏</a>
                    </td>
                </tr>
                </tbody>
            </table>

            <!--分页-->
            <div class="fr page ">
                <div style="text-align: center">
                    <div class="dataTables_paginate paging_bootstrap pagination">
                        <ul class="pagination" style="padding-top: 50px">
                            <li class="page-item" th:if="${page.hasPreviousPage}">
                                <a class="page-link" th:href="@{/collect/list(pno=1)}">首页</a >
                            </li>
                            <li class="page-item"><a class="page-link" th:href="@{/collect/list(pno=${page.prePage})}"
                                th:if="${page.hasPreviousPage}">上一页</a >
                            </li>
                            <li th:class="${num == page.pageNum? 'active' : ''}"
                                th:each="num:${#numbers.sequence(1, page.pages)}">
                                <a class="page-link active" th:href="@{/collect/list(pno=${num})}">[[${num}]]</a ></li>
                            <li class="page-item"><a class="page-link" th:href="@{/collect/list(pno=${page.nextPage})}"
                                 th:if="${page.hasNextPage}">下一页</a >
                            </li>
                            <li class="page-item"><a class="page-link" th:href="@{/collect/list(pno=${page.pages})}"
                                 th:if="${page.hasNextPage}">尾页</a ></li>
                        </ul>
                        <div style="font-size: 18px;margin-left: 10px;">
                            当前页<b style="color: #f1704c;margin-right: 10px;margin-left: 10px">[[${page.pageNum}]] </b>
                            总计<b style="color: #f1704c;margin-right: 5px;margin-left: 8px">[[${page.pages}]] </b>页
                            <text style="margin-left: 5px">共</text>
                            <b style="color: #f1704c;margin-right: 5px;margin-left: 5px"> [[${page.total}]] </b>条
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</div>


<!--页脚 -->
<footer>
    <div id="footer">
        <div class="container">
            <br , style="color: deepskyblue;">Copyright © 2023 丽江文化旅游学院   </br>
            <br style="color: deepskyblue;">All Rights Reserved & ICP Licensed</br>
            <br style="color: deepskyblue;">onlinefun.fun 滇ICP备:2023002014号 </br>
        </div>
    </div>
</footer>

<!--导入layui js文件-->
<script src="../../static/layui/layui.js" th:src="@{/layui/layui.js}"></script>
<!-- jQuery (necessary for Bootstrap's JavaScript plugins) -->
<script type="text/javascript" src="../static/js/jquery-2.1.1.js" th:src="@{/js/jquery-2.1.1.js}"></script>
<!-- Include all compiled plugins (below), or include individual files as needed -->
<script type="text/javascript" src="../static/js/bootstrap.min.js" th:src="@{/js/bootstrap.min.js}"></script>
<script type="text/javascript" src="../static/js/SmoothScroll.js" th:src="@{/js/SmoothScroll.js}"></script>
<script type="text/javascript" src="../static/js/wow.min.js" th:src="@{/js/wow.min.js}"></script>
<script type="text/javascript" src="../static/js/jquery.isotope.js" th:src="@{/js/jquery.isotope.js}"></script>
<script type="text/javascript" src="../static/js/main.js" th:src="@{/js/main.js}"></script>
<!-- HTML5 Shim and Respond.js IE8 support of HTML5 elements and media queries -->
<!-- WARNING: Respond.js doesn't work if you view the page via file:// -->
<!--[if lt IE 9]>
<script src="../static/js/html5shiv.js" th:src="@{/js/html5shiv.js}"></script>
<script src="../static/js/respond.min.js" th:src="@{/js/respond.min.js}"></script>
<![endif]-->

</body>
</html>
