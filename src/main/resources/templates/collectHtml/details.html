                                <form method="post" th:action="@{/goods/pay}">

                                    <input name="name" th:value="${collectByfId.ssName}" type="hidden"/>
                                    <span>购买数量：</span>
                                    <input class="form-control" id="buyNum" name="num" placeholder="购买数量"/>
                                    <div class="form-group mt-3">

                            </div>
