<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <meta name="description" content="Free Responsive Html5 Templates">
    <meta name="author" content="">
    <link rel="icon" href="../static/images/icon.png" th:href="@{/images/icon.png}">
    <title>云间游</title>

    <!-- 导入layui -->
    <link href="../static/layui/css/layui.css" rel="stylesheet" th:href="@{/layui/css/layui.css}"/>
    <!-- Bootstrap CSS-->
    <link href="../static/css/bootstrap.min.css" rel="stylesheet" th:href="@{/css/bootstrap.min.css}"/>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="../static/css/style.css" th:href="@{/css/style.css}"/>
    <link rel="stylesheet" type="text/css" href="../static/css/animate.min.css" th:href="@{/css/animate.min.css}"/>

    <!-- Custom Fonts -->
    <link href="../static/font-awesome/css/font-awesome.min.css" rel="stylesheet" type="text/css"
          th:href="@{/font-awesome/css/font-awesome.min.css}"/>

</head>
<body>
<!--导航栏-->
<nav id="menu" class="navbar navbar-default navbar-fixed-top navbar-transparent">
    <div class="container">
        <div class="collapse navbar-collapse" id="bs-example-navbar-collapse-1">
            <img src="../static/images/logo.png" th:src="@{/images/logo.png}"
                 style="width: 190px; height:50px;float: left;">
            <ul class="nav navbar-nav navbar-right">
                <!--TODO 导航栏功能跳转按钮，后期添加-->
                <li><a th:href="@{/index}"><i class="layui-icon layui-icon-home" style="font-size: 18px"></i> 首页</a>
                </li>
                <li><a th:if="${session.user!=null}" href="/个人中心（目前没写）"
                       th:text="'欢迎你：'+${session.user.uName}">
                    <i class="layui-icon layui-icon-user" style="font-size: 18px"></i>
                </a><a th:if="${session.user==null}" href="/login"><i class="layui-icon layui-icon-user"
                                                                      style="font-size: 18px"></i> 登录 | 注册</a></li>
                <li><a th:if="${session.user!=null}" href="/logout">退出</a></li>
                <li><a href=""><i class="layui-icon layui-icon-console" style="font-size: 18px"></i>订单管理</a></li>
                <li><a th:href="@{/}"><i class="layui-icon layui-icon-tips" style="font-size: 18px"></i> 关于云间游</a>
                </li>
            </ul>
        </div>
    </div>
</nav>
<!-- 内容 -->
<div id="page-content" class="index-page">
    <section id="" class="box-content box-style text-center">
        <div class="container">
        <h1 style="text-align:left">订单管理</h1>
            <table class="layui-table">
                <colgroup>
                    <col width="200">
                    <col width="200">
                    <col width="200">
                    <col width="250">
                    <col width="200">
                    <col width="200">
                </colgroup>
                <thead>
                <tr>
                    <th>景点名</th>
                    <th>姓名</th>
                    <th>联系方式</th>
                    <th>身份证号</th>
                    <th>日期</th>
                    <th>操作</th>
                </tr>
                </thead>
                <tbody>
                    <tr th:each="ticket:${tickets}">
                        <input type="hidden" name="id" th:value="${ticket.id}"/>
                        <td th:text="${ticket.name}"></td>
                        <td th:text="${ticket.username}"></td>
                        <td th:text="${ticket.phone}"></td>
                        <td th:text="${ticket.cardNo}"></td>
                        <td th:text="${ticket.udate}"></td>
                        <td>
                            <a th:if="${ticket.own==1}" th:onclick="'edit(\''+${ticket.id}+'\')'" class="layui-btn layui-btn-normal layui-btn-sm">修改</a>
                            <a th:if="${ticket.own==1}" th:onclick="'cancel(\''+${ticket.id}+'\')'" class="layui-btn layui-btn-danger layui-btn-sm">取消</a>
                        </td>
                   </tr>
                </th:each>
                </tbody>
            </table>
        </div>
    </section>
</div>
</body>


<!--导入layui js文件-->
<script src="../static/layui/layui.js" th:src="@{/layui/layui.js}"></script>
<!-- jQuery (necessary for Bootstrap's JavaScript plugins) -->
<script type="text/javascript" src="../static/js/jquery-2.1.1.js" th:src="@{/js/jquery-2.1.1.js}"></script>
<!-- Include all compiled plugins (below), or include individual files as needed -->
<script type="text/javascript" src="../static/js/bootstrap.min.js" th:src="@{/js/bootstrap.min.js}"></script>
<script type="text/javascript" src="../static/js/SmoothScroll.js" th:src="@{/js/SmoothScroll.js}"></script>
<script type="text/javascript" src="../static/js/wow.min.js" th:src="@{/js/wow.min.js}"></script>
<script type="text/javascript" src="../static/js/jquery.isotope.js" th:src="@{/js/jquery.isotope.js}"></script>
<script type="text/javascript" src="../static/js/main.js" th:src="@{/js/main.js}"></script>
<!-- HTML5 Shim and Respond.js IE8 support of HTML5 elements and media queries -->
<!-- WARNING: Respond.js doesn't work if you view the page via file:// -->
<!--[if lt IE 9]>
<script src="../static/js/html5shiv.js" th:src="@{/js/html5shiv.js}"></script>
<script src="../static/js/respond.min.js" th:src="@{/js/respond.min.js}"></script>
<![endif]-->
<script th:inline="javascript">
    // var result = [[\${(session.result)}]] ;
    // if (result){
    //     alert('购票成功！');
    // }
    function cancel(id){
        layer.confirm('是否取消订单？', {
            btn: ['确定', '取消'] //可以无限个按钮
        }, function(index, layero){
            $.ajax({
                url:"/user/delete?id="+id,
                type:"get",
                success:function (data) {
                    if(data.code==0){
                        layer.msg('取消成功',{icon:1,time:1000});
                        setTimeout(function () {
                            window.location.href="/orderMng";
                        },1000);
                    }else{
                        layer.msg('取消失败',{icon:2,time:1000});
                    }
                }
            })
            layer.close(index);
        }, function(index){
        });
    }
    function edit(id){
        layer.open({
            type: 2,
            title:'编辑',
            area:['25%','70%'],
            content: '/orderEdit?id='+id, //这里content是一个普通的String
        });
    }
</script>
</body>
</html>
