<!doctype html>
<html>
	<!--TODO：富文本编辑器暂不回显，直接使用textarea-->
	<head>
		<meta charset="utf-8">
		<title>景点详情</title>
		<link href="../../static/layui/css/layui.css" rel="stylesheet" th:href="@{/layui/css/layui.css}"/>
		<link href="../../static/kindeditor/themes/default/default.css" rel="stylesheet" th:href="@{/kindeditor/themes/default/default.css}"/>
	</head>
	<body>
	<div class="layui-container" style="margin-top:20px;">
		<div class="layui-row">
			<div class="layui-col-md8 layui-col-md-offset2">
				<form class="layui-form layui-form-pane" >
					<input type="hidden" id="id" name="id"/>
					<div class="layui-form-item">
						<label class="layui-form-label">景点名称</label>
						<div class="layui-input-inline">
							<input readonly="readonly" style="width: 600px" id="spotName" type="text" name="spotName" autocomplete="off" class="layui-input ">
						</div>
					</div>
					<div class="layui-form-item">
						<label class="layui-form-label">景点地址</label>
						<div class="layui-input-inline">
							<input readonly="readonly" style="width: 600px" id="spotAddress" type="text" name="spotAddress" autocomplete="off" class="layui-input">
						</div>
					</div>
					<div class="layui-form-item">
						<label  class="layui-form-label">景点图片</label>
						<hr> <img id="spotImg" src="" alt="上传成功后渲染" style="max-width: 100%;">
						<!--隐藏域-->
						<input type="hidden" name="spotImgUrl" id="spotImgUrl"/>
					</div>
					<div class="layui-form-item">
						<label class="layui-form-label">开放时间</label>
						<div class="layui-input-inline">
							<input disabled style="width: 600px" id="startTime" type="text" name="startTime" class="layui-input">
						</div>
					</div>
					<div class="layui-form-item">
						<label class="layui-form-label">关闭时间</label>
						<div class="layui-input-inline">
							<input disabled style="width: 600px" id="endTime" type="text" name="endTime" class="layui-input" >
						</div>
					</div>
					<div class="layui-form-item">
						<label class="layui-form-label">门票</label>
						<div class="layui-input-inline">
							<input readonly="readonly" style="width: 600px" id="ticketPrice" type="text" name="ticketPrice" autocomplete="off" class="layui-input">
						</div>
					</div>
					<div class="layui-form-item">
						<label class="layui-form-label">景点状态</label>
						<div class="layui-input-inline" id="soptState"></div>
					</div>
				</form>
			</div>
		</div>
	</div>
		<script src="../../static/layui/layui.js" th:src="@{/layui/layui.js}"></script>
		<script src="../../static/kindeditor/kindeditor-all-min.js" th:src="@{/kindeditor/kindeditor-all-min.js}"></script>
		<script src="../../static/kindeditor/lang/zh-CN.js" th:src="@{/kindeditor/lang/zh-CN.js}"></script>

		<script>
			layui.use(function(){
				let laydate=layui.laydate;
				let $ = layui.$;
				let layer=layui.layer;
				let form=layui.form;
				let upload=layui.upload;

				//获取当前页面地址
				let url=location.href;
				//截取参数
				let param=url.substring(url.lastIndexOf("?")+1,url.length);
				let ps=param.split("&");
				//截取参数
				let obj={};
				if (ps&&ps.length>0){
					for (let i=0;i<ps.length;i++){
						let psList=ps[i].split("=");
						obj[psList[0].trim()]=psList[1].trim();
					}
				}
				console.log(obj);

				// 日期时间选择器 - 日期和时间选择器同时显示（全面板）
				laydate.render({
					elem: '#startTime',
					type: 'datetime',
					fullPanel: true // 2.8+
				});
				laydate.render({
					elem: '#endTime',
					type: 'datetime',
					fullPanel: true // 2.8+
				});

				//单选框回显
				let str='';
				if (obj.soptState==1){
					str+='<input disabled type="radio" name="soptState" value="0" title="未开放" >';
					str+='<input disabled type="radio" name="soptState" value="1" title="已开放" checked>';
				}else {
					str+='<input disabled type="radio" name="soptState" value="0" title="未开放" checked>';
					str+='<input disabled type="radio" name="soptState" value="1" title="已开放" >';
				}

				//将拼接好的单选框设置到指定位置
				$("#soptState").html(str);

				//重新渲染
				form.render('radio');
			})
		</script>

	</body>

</html>
