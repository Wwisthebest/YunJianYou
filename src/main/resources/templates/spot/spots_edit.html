<!doctype html>
<html>
	<!--TODO：富文本编辑器暂不回显，直接使用textarea-->
	<head>
		<meta charset="utf-8">
		<title>编辑景点信息</title>
		<link href="../../static/layui/css/layui.css" rel="stylesheet" th:href="@{/layui/css/layui.css}"/>
		<link href="../../static/kindeditor/themes/default/default.css" rel="stylesheet" th:href="@{/kindeditor/themes/default/default.css}"/>
	</head>
	<body>
	<div class="layui-container" style="margin-top:20px;">
		<div class="layui-row">
			<div class="layui-col-md8 layui-col-md-offset2">
				<form class="layui-form layui-form-pane" >
					<input type="hidden" id="id" name="id"/>
					<div class="layui-form-item">
						<label class="layui-form-label">景点名称</label>
						<div class="layui-input-inline">
							<input  style="width: 600px" id="spotName" type="text" name="spotName" autocomplete="off" placeholder="请输入景点名称"  class="layui-input">
						</div>
					</div>
					<div class="layui-form-item">
						<label class="layui-form-label">景点地址</label>
						<div class="layui-input-inline">
							<input style="width: 600px" id="spotAddress" type="text" name="spotAddress" autocomplete="off" placeholder="请输入景点地址" class="layui-input">
						</div>
					</div>
					<div class="layui-form-item">
						<label class="layui-form-label">景点简介</label>
						<div class="layui-input-block">
							<div id="editor" >
								<textarea  id="spotInfo" name="spotInfo" style="width: 500px;height: 600px;"></textarea>
							</div>
						</div>
					</div>
					<div class="layui-form-item">
						<label class="layui-form-label">开放时间</label>
						<div class="layui-input-inline">
							<input style="width: 600px" id="startTime" type="text" name="startTime" class="layui-input" placeholder="选择开放时间">
						</div>
					</div>
					<div class="layui-form-item">
						<label class="layui-form-label">关闭时间</label>
						<div class="layui-input-inline">
							<input style="width: 600px" id="endTime" type="text" name="endTime" class="layui-input" placeholder="选择关闭时间">
						</div>
					</div>
					<div class="layui-form-item">
						<label class="layui-form-label">门票价格</label>
						<div class="layui-input-inline">
							<input style="width: 600px" id="ticketPrice" type="text" name="ticketPrice" autocomplete="off" placeholder="请输入门票价格"  class="layui-input">
						</div>
					</div>
					<div class="layui-form-item">
						<label class="layui-form-label">门票数量</label>
						<div class="layui-input-inline">
							<input style="width: 600px" id="ticketNum" type="text" name="ticketNum" autocomplete="off" placeholder="请输入门票数量"  class="layui-input">
						</div>
					</div>
					<div class="layui-form-item">
						<label class="layui-form-label">景点状态</label>
						<div class="layui-input-inline" id="soptState"></div>
					</div>
					<div class="layui-form-item">
						<label  class="layui-form-label">景点图片</label>
						<div class="layui-input-block">
							<div class="layui-upload-drag" style="display: block;" id="ID-upload-demo-drag">
								<i class="layui-icon layui-icon-upload"></i>
								<div id="ID-upload-demo-preview">
									<hr> <img id="spotImg" src="" alt="上传成功后渲染" style="max-width: 100%;">
								</div>
							</div>
						</div>
						<!--隐藏域-->
						<input type="hidden" name="spotImgUrl" id="spotImgUrl"/>
					</div>
					<div class="layui-form-item">
						<label class="layui-form-label">景点地图</label>
						<div class="layui-input-block">
							<div id="editor2" >
								<textarea  id="mapInfo" name="mapInfo" style="width: 500px;height: 600px;"></textarea>
							</div>
						</div>
					</div>
					<div class="layui-form-item" style="margin-left: 300px">
						<button class="layui-btn" lay-submit lay-filter="edit">更新</button>
					</div>

				</form>
			</div>
		</div>
	</div>
	<script src="../../static/layui/layui.js" th:src="@{/layui/layui.js}"></script>
	<script src="../../static/kindeditor/kindeditor-all-min.js" th:src="@{/kindeditor/kindeditor-all-min.js}"></script>
	<script src="../../static/kindeditor/lang/zh-CN.js" th:src="@{/kindeditor/lang/zh-CN.js}"></script>

	<script>
			//TODO:富文本编辑器回显

			//初始化kindEditor编辑器
			var editor;
			var editor2;

			layui.use(function(){
				let laydate=layui.laydate;
				let $ = layui.$;
				let layer=layui.layer;
				let form=layui.form;
				let upload=layui.upload;

				//获取当前页面地址
				let url=location.href;
				//截取参数
				let param=url.substring(url.lastIndexOf("?")+1,url.length);
				let ps=param.split("&");
				//截取参数
				let obj={};
				if (ps&&ps.length>0){
					for (let i=0;i<ps.length;i++){
						let psList=ps[i].split("=");
						obj[psList[0].trim()]=psList[1].trim();
					}
				}
				console.log(obj);

				// 日期时间选择器 - 日期和时间选择器同时显示（全面板）
				laydate.render({
					elem: '#startTime',
					type: 'datetime',
					fullPanel: true // 2.8+
				});
				laydate.render({
					elem: '#endTime',
					type: 'datetime',
					fullPanel: true // 2.8+
				});

				//图片上传
				upload.render({
					elem:'#ID-upload-demo-drag',
					url: 'http://localhost:8086/file/upload',
					done:function (res) {
						console.log(res);
						//将图片的服务器地址设置到对应的隐藏域中
						$("#spotImgUrl").val(res.data);

						layer.msg('上传成功');
						$('#ID-upload-demo-preview').find('img').attr('src',res.data);
					}
				});

				//单选框回显
				let str='';
				if (obj.soptState==1){
					str+='<input type="radio" name="soptState" value="0" title="未开放" >';
					str+='<input type="radio" name="soptState" value="1" title="已开放" checked>';
				}else {
					str+='<input type="radio" name="soptState" value="0" title="未开放" checked>';
					str+='<input type="radio" name="soptState" value="1" title="已开放" >';
				}

				//将拼接好的单选框设置到指定位置
				$("#soptState").html(str);

				//重新渲染
				form.render('radio');


				form.on("submit(edit)",function(data){
					let field=data.field;
					// data.field.spotInfo=editor.html();
					//AJAX向后端发送请求
					$.ajax({
						type:"put",
						url:"http://localhost:8086/spots/updateById",
						data:JSON.stringify(field),
						contentType:'application/json',
						dataType:"json",
						success:function(d){
							console.log(d)
							if(d.code==0){
								let index=parent.layer.getFrameIndex(window.name);
								parent.layer.close(index);
							}else{
								layer.msg(d.msg);
							}
						}
					});
					return false;
				});
				
			})
		</script>
</body>

</html>
