<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="description" content="Free Responsive Html5 Templates">
    <meta name="author" content="">
    <link rel="icon" href="../static/images/icon.png" th:href="@{/images/icon.png}">
    <title>个人中心</title>

    <!-- Bootstrap CSS-->
    <link href="../../static/css/bootstrap.min.css" rel="stylesheet" th:href="@{/css/bootstrap.min.css}"/>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../../static/css/ticket.css" th:href="@{/css/ticket.css}"/>
    <link rel="stylesheet" type="text/css" href="../../static/css/animate.min.css" th:href="@{/css/animate.min.css}"/>
    <!-- Custom Fonts -->
    <link href="../../static/font-awesome/css/font-awesome.min.css" rel="stylesheet" type="text/css" th:href="@{/font-awesome/css/font-awesome.min.css}"/>
    <link href="../../static/layui.css" rel="stylesheet" th:href="@{/layui/css/layui.css}">
</head>
<body>
<!--导航栏-->
<nav id="menu" class="navbar navbar-default navbar-fixed-top navbar-transparent">
    <div class="container">
        <div class="collapse navbar-collapse" id="bs-example-navbar-collapse-1">
            <img src="../static/images/logo.png" th:src="@{/images/logo.png}" style="width: 190px; height:50px;float: left;" >
            <ul class="nav navbar-nav navbar-right">

                <!--TODO 导航栏功能跳转按钮，后期添加-->
                <li><a style="font-size: 20px;float: right;" th:if="${session.user!=null}" th:text="'欢迎你：'+${session.user.uName}"></a></li>
                <li><a href="/index" class="page-scroll">主页</a></li>
                <li><a th:if="${session.user==null}" href="/login">登录 | 注册</a></li>
                <li><a th:if="${session.user!=null}" href="/logout">退出</a></li>
            </ul>
        </div>
    </div>
</nav>


<!-- 内容 -->
<div id="page-content" class="index-page colla">
    <div class="box-content box-style text-center" >
        <ul class="nav nav-tabs" style="margin-top: 100px;margin-left: 400px;margin-right: 400px">
            <li class="active"><a th:href="@{/user_info}">个人中心</a></li>
            <li><a th:href="@{/to_changePassword}">修改密码</a></li>
            <li><a th:href="@{/collect/list}">收藏</a></li>
        </ul>
    </div>

    <form class="layui-form" id="updateUserForm" style="margin-left: 500px">
        <table border="0" cellpadding="0" cellspacing="0" width="500">
            <tr>
                <td align="left" height="30">昵称:</td>
                <td align="left" height="30"><input type="text" th:value="${session.user.uNickName}" class="" id="uNickName" name="uNickName"></td>
            </tr>
            <tr>
                <td align="left" height="30">真实姓名:</td>
                <td  align="left" height="30"><input type="text" th:value="${session.user.uName}" class="" id="uName" name="uName" style="background-color: rgba(162,161,161,0.42);" readonly></td>
            </tr>
            <tr>
                <td align="left" height="30">身份证号:</td>
                <td  align="left" height="30"><input type="text" th:value="${session.user.uIdNum}" class="" id="uIdNum" name="uIdNum" style="background-color: rgba(162,161,161,0.42);" readonly></td>
            </tr>
            <tr>
                <td align="left" height="30">手机号:</td>
                <td align="left" height="30"><input type="text" th:value="${session.user.phone}" class="" id="phone" name="phone"></td>
            </tr>
            <tr>
                <td align="left" height="30">邮箱:</td>
                <td align="left" height="30"><input type="email" th:value="${session.user.email}" class="" id="email" name="email"></td>
            </tr>
            <tr>
                <td >性别:</td>
                <td align="left" height="30"><input type="text" th:value="${session.user.sex}" class="" id="sex" name="sex" style="background-color: rgba(162,161,161,0.42);" readonly></td>
            </tr>
            <tr>
                <td colspan="2" height="30">注:  <span style="color: #842624">  请如实填写您的信息</span> </td>
            </tr>
            <tr >
                <td colspan="2" align="center" valign="middle" height="30"><span style="color: red" id="message"></span>
                    <button type="button" onclick="updateUserInfo();"><p style="height: 33px;width: 150px;font-size: 25px;background-color: #afb49d">更新</p></button> </td>

            </tr>
            <td>&nbsp;</td>
        </table>
    </form>

</div>


<!--页脚 -->

<footer>
    <div id="footer">
        <div class="container">
            <br style="color: deepskyblue;",>Copyright © 2023 丽江文化旅游学院   </br>
            <br style="color: deepskyblue;">All Rights Reserved & ICP Licensed</br>
            <br style="color: deepskyblue;">onlinefun.fun 滇ICP备:2023002014号 </br>
        </div>
    </div>
</footer>
<!--导入layui js文件-->
<script src="../../static/layui/layui.js" th:src="@{/layui/layui.js}"></script>
<!-- jQuery (necessary for Bootstrap's JavaScript plugins) -->
<script type="text/javascript" src="../static/js/jquery-2.1.1.js" th:src="@{/js/jquery-2.1.1.js}"></script>
<script type="text/javascript" src="/twitter-bootstrap/twitter-bootstrap-v2/docs/assets/js/bootstrap-collapse.js"></script>
<!-- Include all compiled plugins (below), or include individual files as needed -->
<script type="text/javascript" src="../static/js/bootstrap.min.js" th:src="@{/js/bootstrap.min.js}"></script>
<script type="text/javascript" src="../static/js/SmoothScroll.js" th:src="@{/js/SmoothScroll.js}"></script>
<script type="text/javascript" src="../static/js/wow.min.js" th:src="@{/js/wow.min.js}"></script>
<script type="text/javascript" src="../static/js/jquery.isotope.js" th:src="@{/js/jquery.isotope.js}"></script>
<script type="text/javascript" src="../static/js/main.js" th:src="@{/js/main.js}"></script>
<!-- HTML5 Shim and Respond.js IE8 support of HTML5 elements and media queries -->
<!-- WARNING: Respond.js doesn't work if you view the page via file:// -->
<!--[if lt IE 9]>
<script src="../static/js/html5shiv.js" th:src="@{/js/html5shiv.js}"></script>
<script src="../static/js/respond.min.js" th:src="@{/js/respond.min.js}"></script>
<![endif]-->
<script type="text/javascript">
    //修改个人信息
    function updateUserInfo(){
        var datas = $("#updateUserForm").serialize();
        $.post("/user/user_updateInfo",datas,function (result){
            if (result.code==200){
                alert("个人信息更新成功。");
                location.href="/user_info";
            }else {
                //回显错误消息
                $("#message").text(result.message);
            }
        },"json");
    }

</script>
</body>

</html>
